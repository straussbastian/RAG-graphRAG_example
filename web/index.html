<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RAG · Vektorraum</title>
  <link rel="preload" as="font" type="font/woff2" href="/graph-static/fonts/ChakraPetch-700.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="/graph-static/fonts/Sora-400.woff2" crossorigin />
  <script src="/static/plotly.min.js" charset="utf-8"></script>
  <link rel="stylesheet" href="/static/style.css?v=3" />
  <style>
    .examples { position: fixed; top: 110px; left: 0; right: 0; z-index: 6;
      display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; padding: 0 16px; pointer-events: none; }
    .examples .ex-label { pointer-events: none; align-self: center; font-family: 'Chakra Petch', monospace;
      font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: #8b97b4; margin-right: 2px; }
    .examples button { pointer-events: auto; font-family: 'Chakra Petch', monospace; font-size: 11px;
      letter-spacing: .03em; color: #eaf0ff; background: rgba(12,17,30,.7); border: 1px solid rgba(140,175,255,.18);
      border-radius: 999px; padding: 6px 13px; cursor: pointer; backdrop-filter: blur(6px);
      transition: border-color .2s, color .2s, background .2s; }
    .examples button:hover { border-color: #a78bfa; color: #fff; background: rgba(167,139,250,.14); }
  </style>
</head>
<body>
  <div id="plot"></div>
  <div class="atmos vignette"></div>
  <div class="atmos grain"></div>

  <header class="hud-top">
    <div class="brand">
      <div class="glyph"><i></i><i></i><i></i><i></i></div>
      <div class="titles">
        <h1>Klassisches RAG</h1>
        <div class="sub">Vektorraum</div>
      </div>
    </div>
    <form id="queryForm" class="search">
      <div class="field">
        <input id="q" type="text" autocomplete="off"
               placeholder="Suchtext eingeben… z. B. „Listenansicht“" />
      </div>
      <button type="submit">Suchen</button>
      <button type="button" id="resetBtn" class="secondary">Reset</button>
    </form>
  </header>

  <div class="hint" id="hint">249 Chunks als Embeddings — semantisch Ähnliches liegt nah beieinander</div>

  <div class="examples" id="examples"><span class="ex-label">Beispiele</span></div>

  <aside class="hud-panel">
    <div class="panel-label">Nächste Nachbarn</div>
    <div id="status">Bereit. Punktwolke geladen.</div>
  </aside>

  <script src="/static/app.js?v=3"></script>
</body>
</html>
