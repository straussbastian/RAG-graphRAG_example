# Self-contained RAG x GraphRAG demo. The ONLY thing you must provide is a
# Mistral API key in .env (see env.example). Everything else runs locally:
#
#   qdrant    — the vector DB for classic RAG (seeded from data/qdrant_seed.json)
#   lightrag  — the knowledge-graph engine for GraphRAG, pointed at Mistral,
#               with its graph pre-built in ./lightrag_storage
#   demo      — the FastAPI app serving all five views on http://localhost:8888
#
#   docker compose up      → open http://localhost:8888
services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: rag-demo-qdrant
    ports:
      - "6333:6333"   # HTTP API + dashboard at http://localhost:6333/dashboard
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  lightrag:
    image: ghcr.io/hkuds/lightrag:latest
    container_name: rag-demo-lightrag
    ports:
      - "9621:9621"   # LightRAG server + web UI
    environment:
      HOST: "0.0.0.0"
      PORT: "9621"
      WORKING_DIR: "/app/data/rag_storage"
      LIGHTRAG_API_KEY: "local-demo-key"
      # Both the LLM and the embeddings run on Mistral via its OpenAI-compatible API.
      LLM_BINDING: "openai"
      LLM_MODEL: "mistral-small-latest"
      LLM_BINDING_HOST: "https://api.mistral.ai/v1"
      LLM_BINDING_API_KEY: "${MISTRAL_API_KEY}"
      EMBEDDING_BINDING: "openai"
      EMBEDDING_MODEL: "mistral-embed"
      EMBEDDING_DIM: "1024"
      EMBEDDING_BINDING_HOST: "https://api.mistral.ai/v1"
      EMBEDDING_BINDING_API_KEY: "${MISTRAL_API_KEY}"
    volumes:
      # Pre-built knowledge graph (743 entities / 1134 relations) — no rebuild,
      # no ingest cost. The app talks to this server for live GraphRAG queries.
      - ./lightrag_storage:/app/data/rag_storage
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9621/health')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  demo:
    build: .
    image: rag-graphrag-demo:latest
    container_name: rag-graphrag-demo
    # Reachable from outside on 8888  ->  uvicorn inside the container on 8000.
    ports:
      - "8888:8000"
    # MISTRAL_API_KEY comes from .env; the local service URLs are forced here so
    # they win over any external values that might be left in .env.
    env_file:
      - .env
    environment:
      LOKAL: "true"
      QDRANT_URL: "http://qdrant:6333"
      QDRANT_API_KEY: ""
      LIGHTRAG_URL: "http://lightrag:9621"
      LIGHTRAG_API_KEY: "local-demo-key"
    depends_on:
      qdrant:
        condition: service_started
      lightrag:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", ".venv/bin/python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  qdrant_storage:
