<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GraphRAG · Wissensgraph</title>
  <link rel="preload" as="font" type="font/woff2" href="/graph-static/fonts/ChakraPetch-700.woff2" crossorigin />
  <link rel="preload" as="font" type="font/woff2" href="/graph-static/fonts/Sora-400.woff2" crossorigin />
  <script src="/graph-static/3d-force-graph.min.js"></script>
  <link rel="stylesheet" href="/graph-static/style.css" />
  <style>
    .examples { position: fixed; top: 110px; left: 0; right: 0; z-index: 6;
      display: flex; justify-content: center; flex-wrap: wrap; gap: 8px; padding: 0 16px; pointer-events: none; }
    .examples .ex-label { pointer-events: none; align-self: center; font-family: 'Chakra Petch', monospace;
      font-size: 10px; letter-spacing: .22em; text-transform: uppercase; color: #8b97b4; margin-right: 2px; }
    .examples button { pointer-events: auto; font-family: 'Chakra Petch', monospace; font-size: 11px;
      letter-spacing: .03em; color: #eaf0ff; background: rgba(12,17,30,.7); border: 1px solid rgba(140,175,255,.18);
      border-radius: 999px; padding: 6px 13px; cursor: pointer; backdrop-filter: blur(6px);
      transition: border-color .2s, color .2s, background .2s; }
    .examples button:hover { border-color: #29e3ff; color: #fff; background: rgba(41,227,255,.14); }
  </style>
</head>
<body>
  <div id="graph"></div>
  <div class="atmos vignette"></div>
  <div class="atmos grain"></div>

  <header class="hud-top">
    <div class="brand">
      <div class="glyph"></div>
      <div class="titles">
        <h1>GraphRAG</h1>
        <div class="sub">Wissensgraph</div>
      </div>
    </div>
    <form id="qform" class="search">
      <div class="field">
        <input id="q" type="text" autocomplete="off"
               placeholder="Frage stellen… z. B. „Welche Aufgabe hat ein Mitarbeiter?“" />
      </div>
      <select id="mode" title="Retrieval-Modus">
        <option value="mix">mix</option>
        <option value="hybrid">hybrid</option>
        <option value="local">local</option>
        <option value="global">global</option>
        <option value="naive">naive · ohne Graph</option>
      </select>
      <button type="submit">Suchen</button>
      <button type="button" id="reset">Reset</button>
    </form>
  </header>

  <div class="hint" id="hint">Stelle eine Frage — der traversierte Subgraph leuchtet auf</div>

  <div class="examples" id="examples"><span class="ex-label">Beispiele</span></div>

  <aside class="hud-panel">
    <div class="panel-label">Retrieval</div>
    <div id="status">Bereit. Graph geladen.</div>
    <div id="keywords"></div>
    <div class="legend-wrap">
      <div class="panel-label">Entity-Typen · klicken zum Filtern</div>
      <div id="legend"></div>
    </div>
  </aside>

  <script src="/graph-static/app.js"></script>
</body>
</html>
